services:
  jojeco-dashboard-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: jojeco-dashboard-api
    ports:
      - "3001:3001"
    volumes:
      - ./server/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/jobot/.ssh/jojeco_lab_key:/root/.ssh/jojeco_lab_key:ro
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - NETDATA_URL=http://netdata:19999
      - QBT_URL=${QBT_URL}
      - QBT_USER=${QBT_USER}
      - QBT_PASS=${QBT_PASS}
      - SONARR_URL=${SONARR_URL}
      - SONARR_KEY=${SONARR_KEY}
      - RADARR_URL=${RADARR_URL}
      - RADARR_KEY=${RADARR_KEY}
    restart: unless-stopped
    networks:
      - jojeco-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  jojeco-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: jojeco-dashboard
    ports:
      - "3005:80"
    depends_on:
      - jojeco-dashboard-api
    restart: unless-stopped
    networks:
      - jojeco-network
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    hostname: jojeco-server
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - NETDATA_CLAIM_TOKEN=${NETDATA_CLAIM_TOKEN:-}
      - NETDATA_CLAIM_URL=https://app.netdata.cloud
    ports:
      - "19999:19999"
    networks:
      - jojeco-network

networks:
  jojeco-network:
    driver: bridge

volumes:
  netdataconfig:
  netdatalib:
  netdatacache: