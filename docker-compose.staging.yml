version: '3.8'

# Staging deploy for v3 refactor on port 3007
# Frontend only — proxies /api to the EXISTING prod API container.
# Does NOT touch jojeco-dashboard or jojeco-dashboard-api.

services:
  jojeco-dashboard-v3:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: jojeco-dashboard-v3
    ports:
      - "3007:80"
    restart: unless-stopped
    networks:
      - jojeco-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  jojeco-network:
    # Attach to the prod network so nginx can reach jojeco-dashboard-api
    external: true
    name: jojeco-dashboard_jojeco-network
